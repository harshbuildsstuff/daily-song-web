<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/><title>Daily Song</title><style>@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap');*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}:root{--bg:#09090f;--bg2:#0f0a1e;--purple:#a78bfa;--purple-dim:rgba(167,139,250,0.15);--purple-border:rgba(167,139,250,0.25);--text:#f5f3ff;--text-dim:#6d6d8a;--text-muted:#3d3d5c;--green:#34d399;}html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden;}body{background:radial-gradient(ellipse at top,var(--bg2) 0%,var(--bg) 70%);min-height:100vh;display:flex;flex-direction:column;}.header{display:flex;justify-content:space-between;align-items:flex-start;padding:52px 24px 16px;}.app-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.5px;color:var(--text);}.date-label{font-size:12px;color:var(--text-dim);margin-top:2px;letter-spacing:0.3px;}.refresh-btn{width:44px;height:44px;border-radius:50%;background:var(--purple-dim);border:1px solid var(--purple-border);color:var(--purple);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}.refresh-btn:active{transform:scale(0.9);}.content{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 48px;}.badge{background:var(--purple-dim);border:1px solid var(--purple-border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--purple);letter-spacing:1px;margin-bottom:28px;}.art-container{position:relative;width:290px;height:290px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;}.glow-ring{position:absolute;width:280px;height:280px;border-radius:50%;box-shadow:0 0 60px 20px rgba(167,139,250,0.2);pointer-events:none;}.vinyl{position:absolute;width:270px;height:270px;border-radius:50%;background:#111;border:2px solid #222;display:flex;align-items:center;justify-content:center;animation:spin 20s linear infinite;}.vinyl-center{width:18px;height:18px;border-radius:50%;background:var(--purple);opacity:0.5;}.art-placeholder{width:250px;height:250px;border-radius:20px;background:linear-gradient(135deg,#1a1a2e,#2d1b4e);position:relative;z-index:2;display:flex;align-items:center;justify-content:center;font-size:56px;box-shadow:0 16px 40px rgba(0,0,0,0.7);}.album-art{width:250px;height:250px;border-radius:20px;object-fit:cover;position:relative;z-index:2;box-shadow:0 16px 40px rgba(0,0,0,0.7);display:none;}.song-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:700;text-align:center;padding:0 32px;letter-spacing:-0.5px;line-height:1.2;margin-top:28px;}.song-artist{font-size:15px;color:var(--purple);text-align:center;margin-top:6px;letter-spacing:0.5px;}.song-album{font-size:12px;color:var(--text-muted);text-align:center;margin-top:6px;}.buttons{width:100%;padding:0 28px;margin-top:32px;display:flex;flex-direction:column;gap:12px;}.btn-copy{background:var(--purple);border:none;border-radius:16px;padding:18px;font-size:16px;font-weight:700;color:#0a0a0f;cursor:pointer;box-shadow:0 8px 24px rgba(167,139,250,0.4);width:100%;}.btn-copy.success{background:var(--green);}.btn-spotify{background:transparent;border:1px solid var(--purple-border);border-radius:14px;padding:15px;font-size:15px;font-weight:500;color:var(--purple);cursor:pointer;width:100%;}.footer{font-size:12px;color:var(--text-muted);margin-top:28px;letter-spacing:0.5px;}@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}</style></head><body><div class="header"><div><div class="app-name">Daily Song</div><div class="date-label" id="dateLabel"></div></div><button class="refresh-btn" onclick="pickNew()">↻</button></div><div class="content"><div class="badge">✦&nbsp;&nbsp;Today's Pick</div><div class="art-container"><div class="glow-ring"></div><div class="vinyl"><div class="vinyl-center"></div></div><div class="art-placeholder" id="placeholder">🎵</div><img class="album-art" id="albumArt" onload="this.style.display='block';document.getElementById('placeholder').style.display='none';" onerror="this.style.display='none';document.getElementById('placeholder').style.display='flex';"/></div><div class="song-title" id="songTitle"></div><div class="song-artist" id="songArtist"></div><div class="song-album" id="songAlbum"></div><div class="buttons"><button class="btn-copy" id="copyBtn" onclick="doCopy()">Copy for Instagram Note</button><button class="btn-spotify" id="spotifyBtn" onclick="doSpotify()">🎧&nbsp;&nbsp;Open in Spotify</button></div><div class="footer">Paste directly into your Instagram Note ✦</div></div><script>var SONGS=[{title:"Blinding Lights",artist:"The Weeknd",album:"After Hours",url:"https://open.spotify.com/track/0VjIjW4GlUZAMYd2vXMi3b"},{title:"As It Was",artist:"Harry Styles",album:"Harry's House",url:"https://open.spotify.com/track/4LRPiXqCikLlN15c3yImP7"},{title:"Flowers",artist:"Miley Cyrus",album:"Endless Summer Vacation",url:"https://open.spotify.com/track/0yLdNVWF3Srea0uzk55zFn"},{title:"Cruel Summer",artist:"Taylor Swift",album:"Lover",url:"https://open.spotify.com/track/1BxfuPKGuaTgP7aM0Bbdwr"},{title:"Levitating",artist:"Dua Lipa",album:"Future Nostalgia",url:"https://open.spotify.com/track/463CkQjx2Zk1yXoBuierM9"},{title:"Anti-Hero",artist:"Taylor Swift",album:"Midnights",url:"https://open.spotify.com/track/0V3wPSX9ygBnCm8psDIegu"},{title:"Heat Waves",artist:"Glass Animals",album:"Dreamland",url:"https://open.spotify.com/track/02MWAaffLxlfxAUY7c5dvx"},{title:"Happier Than Ever",artist:"Billie Eilish",album:"Happier Than Ever",url:"https://open.spotify.com/track/2MWfG6YPwGBCTbq4FkiSiA"},{title:"Bad Habits",artist:"Ed Sheeran",album:"=",url:"https://open.spotify.com/track/4URGigB4oMWNWxVTsluSJ2"},{title:"good 4 u",artist:"Olivia Rodrigo",album:"SOUR",url:"https://open.spotify.com/track/6PERJ2pcfly4gGnYCqZKxD"},{title:"Calm Down",artist:"Rema & Selena Gomez",album:"Rave & Roses",url:"https://open.spotify.com/track/0WtM2NBus2QK3oUnE8Bbkf"},{title:"Stay",artist:"The Kid LAROI",album:"F*CK LOVE 3",url:"https://open.spotify.com/track/5HCyWlXZPP0y6Gqq8TgA20"},{title:"Butter",artist:"BTS",album:"Butter",url:"https://open.spotify.com/track/3qSio9tNFvPlHwSwFVaGRE"},{title:"Save Your Tears",artist:"The Weeknd",album:"After Hours",url:"https://open.spotify.com/track/5QO79kh1waicV47BqGRL3g"},{title:"drivers license",artist:"Olivia Rodrigo",album:"SOUR",url:"https://open.spotify.com/track/5wANPM4fQCJwkGd4rN57mH"},{title:"Watermelon Sugar",artist:"Harry Styles",album:"Fine Line",url:"https://open.spotify.com/track/6UelLqGlWMcVH1E5c4H7lY"},{title:"Peaches",artist:"Justin Bieber",album:"Justice",url:"https://open.spotify.com/track/4iZ4pt7kvcaH6Yo8UoZ4s2"},{title:"Montero",artist:"Lil Nas X",album:"MONTERO",url:"https://open.spotify.com/track/5Z9KJZvQzH6PFmb8SNkxuk"},{title:"Industry Baby",artist:"Lil Nas X",album:"MONTERO",url:"https://open.spotify.com/track/27NovPIUIRqOyNv2NfFBkk"},{title:"Kiss Me More",artist:"Doja Cat",album:"Planet Her",url:"https://open.spotify.com/track/748mdHapucXQri82geqKtn"}];var current=null;function getToday(){return new Date().toISOString().split('T')[0];}function getSeed(){var d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();}function show(song){current=song;document.getElementById('songTitle').textContent=song.title;document.getElementById('songArtist').textContent=song.artist;document.getElementById('songAlbum').textContent=song.album;document.getElementById('albumArt').src='https://covers.musixmatch.com/covers/albums/'+encodeURIComponent(song.artist)+'/'+encodeURIComponent(song.title)+'/500x500';}function load(){var saved=null;try{var d=localStorage.getItem('ds_date');var s=localStorage.getItem('ds_song');if(d===getToday()&&s){saved=JSON.parse(s);}}catch(e){}if(saved){show(saved);}else{var song=SONGS[getSeed()%SONGS.length];try{localStorage.setItem('ds_date',getToday());localStorage.setItem('ds_song',JSON.stringify(song));}catch(e){}show(song);}}function pickNew(){var song=SONGS[Math.floor(Math.random()*SONGS.length)];try{localStorage.setItem('ds_date',getToday());localStorage.setItem('ds_song',JSON.stringify(song));}catch(e){}show(song);}function doCopy(){if(!current)return;var text='🎵 '+current.title+' – '+current.artist;var btn=document.getElementById('copyBtn');try{navigator.clipboard.writeText(text);}catch(e){var el=document.createElement('textarea');el.value=text;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);}btn.textContent='✓  Copied!';btn.classList.add('success');setTimeout(function(){btn.textContent='Copy for Instagram Note';btn.classList.remove('success');},2000);}function doSpotify(){if(current&&current.url)window.open(current.url,'_blank');}document.getElementById('dateLabel').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});load();</script></body></html>
