<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Daily Song</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --bg: #09090f;
      --bg2: #0f0a1e;
      --purple: #a78bfa;
      --purple-dim: rgba(167,139,250,0.15);
      --purple-border: rgba(167,139,250,0.25);
      --text: #f5f3ff;
      --text-dim: #6d6d8a;
      --text-muted: #3d3d5c;
      --green: #34d399;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    body {
      background: radial-gradient(ellipse at top, var(--bg2) 0%, var(--bg) 70%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 52px 24px 16px;
    }

    .app-name {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .date-label {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 2px;
      letter-spacing: 0.3px;
    }

    /* ── Refresh Button ── */
    .refresh-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }

    .refresh-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--purple-dim);
      border: 1px solid var(--purple-border);
      color: var(--purple);
      font-size: 20px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s, transform 0.2s;
    }

    .refresh-btn:active { transform: scale(0.9); }
    .refresh-btn.disabled { opacity: 0.3; cursor: not-allowed; color: var(--text-muted); background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08); }

    .refresh-hint { font-size: 10px; color: var(--text-dim); }

    /* ── Main Content ── */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0 48px;
    }

    /* ── Badge ── */
    .badge {
      background: var(--purple-dim);
      border: 1px solid var(--purple-border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--purple);
      letter-spacing: 1px;
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards 0.1s;
    }

    /* ── Album Art ── */
    .art-container {
      position: relative;
      width: 290px; height: 290px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 8px;
    }

    .glow-ring {
      position: absolute;
      width: 280px; height: 280px;
      border-radius: 50%;
      box-shadow: 0 0 60px 20px rgba(167,139,250,0.2);
      pointer-events: none;
    }

    .vinyl {
      position: absolute;
      width: 270px; height: 270px;
      border-radius: 50%;
      background: #111;
      border: 2px solid #222;
      display: flex; align-items: center; justify-content: center;
      animation: spin 20s linear infinite;
    }

    .vinyl-center {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--purple); opacity: 0.5;
    }

    .album-art {
      width: 250px; height: 250px;
      border-radius: 20px;
      object-fit: cover;
      position: relative; z-index: 2;
      box-shadow: 0 16px 40px rgba(0,0,0,0.7);
      opacity: 0;
      transform: scale(0.85);
      transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }

    .album-art.loaded { opacity: 1; transform: scale(1); }

    /* placeholder while loading */
    .art-placeholder {
      width: 250px; height: 250px; border-radius: 20px;
      background: linear-gradient(135deg, #1a1a2e, #2d1b4e);
      position: relative; z-index: 2;
      display: flex; align-items: center; justify-content: center;
      font-size: 56px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.7);
    }

    /* ── Song Info ── */
    .song-title {
      font-family: 'Syne', sans-serif;
      font-size: 24px; font-weight: 700;
      text-align: center;
      padding: 0 32px;
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-top: 28px;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards 0.2s;
    }

    .song-artist {
      font-size: 15px; font-weight: 400;
      color: var(--purple);
      text-align: center;
      margin-top: 6px;
      letter-spacing: 0.5px;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards 0.3s;
    }

    .song-album {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 6px;
      letter-spacing: 0.3px;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards 0.4s;
    }

    /* ── Buttons ── */
    .buttons {
      width: 100%;
      padding: 0 28px;
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards 0.5s;
    }

    .btn-copy {
      background: var(--purple);
      border: none; border-radius: 16px;
      padding: 18px;
      font-size: 16px; font-weight: 700;
      color: #0a0a0f;
      cursor: pointer;
      letter-spacing: 0.3px;
      box-shadow: 0 8px 24px rgba(167,139,250,0.4);
      transition: transform 0.15s, background 0.3s, box-shadow 0.3s;
      width: 100%;
    }

    .btn-copy:active { transform: scale(0.97); }

    .btn-copy.success {
      background: var(--green);
      box-shadow: 0 8px 24px rgba(52,211,153,0.4);
    }

    .btn-spotify {
      background: transparent;
      border: 1px solid var(--purple-border);
      border-radius: 14px;
      padding: 15px;
      font-size: 15px; font-weight: 500;
      color: var(--purple);
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }

    .btn-spotify:active { background: var(--purple-dim); }

    /* ── Footer ── */
    .footer {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 28px;
      letter-spacing: 0.5px;
      opacity: 0;
      animation: fadeUp 0.4s ease forwards 0.6s;
    }

    /* ── Loading State ── */
    .loading {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    .loading-text { color: var(--text-dim); font-size: 15px; letter-spacing: 0.5px; }

    .dots { display: flex; gap: 10px; }

    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--purple);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }

    /* ── Animations ── */
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    @keyframes pulse {
      0%, 100% { transform: scale(0.6); opacity: 0.3; }
      50%       { transform: scale(1);   opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Hidden ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div>
      <div class="app-name">Daily Song</div>
      <div class="date-label" id="dateLabel"></div>
    </div>
    <div class="refresh-wrap">
      <button class="refresh-btn" id="refreshBtn" onclick="handleRefresh()">↻</button>
      <span class="refresh-hint" id="refreshHint"></span>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="content">

    <!-- Loading -->
    <div class="loading" id="loadingView">
      <div class="loading-text">Finding your song...</div>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <!-- Song Card (hidden until loaded) -->
    <div id="songCard" class="hidden" style="width:100%;display:flex;flex-direction:column;align-items:center;">
      <div class="badge">✦&nbsp;&nbsp;Today's Pick</div>

      <div class="art-container">
        <div class="glow-ring"></div>
        <div class="vinyl"><div class="vinyl-center"></div></div>
        <div class="art-placeholder" id="artPlaceholder">🎵</div>
        <img class="album-art hidden" id="albumArt" alt="Album Art" />
      </div>

      <div class="song-title" id="songTitle"></div>
      <div class="song-artist" id="songArtist"></div>
      <div class="song-album" id="songAlbum"></div>

      <div class="buttons">
        <button class="btn-copy" id="copyBtn" onclick="handleCopy()">Copy for Instagram Note</button>
        <button class="btn-spotify hidden" id="spotifyBtn" onclick="handleSpotify()">🎧&nbsp;&nbsp;Open in Spotify</button>
      </div>

      <div class="footer">Paste directly into your Instagram Note ✦</div>
    </div>

  </div>

  <script>
    // ── Constants ──
    const STORAGE_KEY_SONG    = 'daily_song:song';
    const STORAGE_KEY_DATE    = 'daily_song:date';
    const STORAGE_KEY_REFRESH = 'daily_song:refreshCount';
    const MAX_REFRESHES = 2;

    // ── State ──
    let currentSong = null;
    let refreshCount = 0;

    // ── Song Pool (fallback if API fails) ──
    const SONG_POOL = [
      { title: "Blinding Lights",  artist: "The Weeknd",        album: "After Hours",           spotifyUrl: "https://open.spotify.com/track/0VjIjW4GlUZAMYd2vXMi3b", cover: null },
      { title: "As It Was",        artist: "Harry Styles",       album: "Harry's House",         spotifyUrl: "https://open.spotify.com/track/4LRPiXqCikLlN15c3yImP7", cover: null },
      { title: "Flowers",          artist: "Miley Cyrus",        album: "Endless Summer Vacation", spotifyUrl: "https://open.spotify.com/track/0yLdNVWF3Srea0uzk55zFn", cover: null },
      { title: "Cruel Summer",     artist: "Taylor Swift",       album: "Lover",                 spotifyUrl: "https://open.spotify.com/track/1BxfuPKGuaTgP7aM0Bbdwr", cover: null },
      { title: "Levitating",       artist: "Dua Lipa",           album: "Future Nostalgia",      spotifyUrl: "https://open.spotify.com/track/463CkQjx2Zk1yXoBuierM9", cover: null },
      { title: "Anti-Hero",        artist: "Taylor Swift",       album: "Midnights",             spotifyUrl: "https://open.spotify.com/track/0V3wPSX9ygBnCm8psDIegu", cover: null },
      { title: "Heat Waves",       artist: "Glass Animals",      album: "Dreamland",             spotifyUrl: "https://open.spotify.com/track/02MWAaffLxlfxAUY7c5dvx", cover: null },
      { title: "Happier Than Ever",artist: "Billie Eilish",      album: "Happier Than Ever",     spotifyUrl: "https://open.spotify.com/track/2MWfG6YPwGBCTbq4FkiSiA", cover: null },
      { title: "Bad Habits",       artist: "Ed Sheeran",         album: "=",                     spotifyUrl: "https://open.spotify.com/track/4URGigB4oMWNWxVTsluSJ2", cover: null },
      { title: "good 4 u",         artist: "Olivia Rodrigo",     album: "SOUR",                  spotifyUrl: "https://open.spotify.com/track/6PERJ2pcfly4gGnYCqZKxD", cover: null },
      { title: "Calm Down",        artist: "Rema & Selena Gomez",album: "Rave & Roses",          spotifyUrl: "https://open.spotify.com/track/0WtM2NBus2QK3oUnE8Bbkf", cover: null },
      { title: "Stay",             artist: "The Kid LAROI",      album: "F*CK LOVE 3",           spotifyUrl: "https://open.spotify.com/track/5HCyWlXZPP0y6Gqq8TgA20", cover: null },
      { title: "Butter",           artist: "BTS",                album: "Butter",                spotifyUrl: "https://open.spotify.com/track/3qSio9tNFvPlHwSwFVaGRE", cover: null },
      { title: "Save Your Tears",  artist: "The Weeknd",         album: "After Hours",           spotifyUrl: "https://open.spotify.com/track/5QO79kh1waicV47BqGRL3g", cover: null },
      { title: "drivers license",  artist: "Olivia Rodrigo",     album: "SOUR",                  spotifyUrl: "https://open.spotify.com/track/5wANPM4fQCJwkGd4rN57mH", cover: null },
    ];

    // ── Helpers ──
    function getTodayString() {
      return new Date().toISOString().split('T')[0];
    }

    function getTodayLabel() {
      return new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    }

    function getFallbackSong() {
      const today = new Date();
      const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
      return SONG_POOL[seed % SONG_POOL.length];
    }

    async function fetchFromDeezer() {
      const queries = ['top hits 2024', 'pop hits', 'trending music', 'viral songs'];
      const q = queries[Math.floor(Math.random() * queries.length)];
      const res = await fetch(`https://api.deezer.com/search?q=${encodeURIComponent(q)}&limit=50`);
      const data = await res.json();
      if (!data.data?.length) throw new Error('No results');
      const track = data.data[Math.floor(Math.random() * Math.min(data.data.length, 30))];
      return {
        title: track.title,
        artist: track.artist.name,
        album: track.album.title,
        cover: track.album.cover_xl || track.album.cover_big,
        spotifyUrl: `https://open.spotify.com/search/${encodeURIComponent(track.title + ' ' + track.artist.name)}`,
      };
    }

    // ── Load or Fetch ──
    async function loadOrFetchSong(forceNew = false) {
      showLoading(true);
      const today = getTodayString();
      const storedDate    = localStorage.getItem(STORAGE_KEY_DATE);
      const storedSong    = localStorage.getItem(STORAGE_KEY_SONG);
      const storedRefresh = localStorage.getItem(STORAGE_KEY_REFRESH);

      refreshCount = storedRefresh ? parseInt(storedRefresh) : 0;

      if (!forceNew && storedDate === today && storedSong) {
        currentSong = JSON.parse(storedSong);
        renderSong(currentSong);
        return;
      }

      let song;
      try {
        song = await fetchFromDeezer();
      } catch (e) {
        song = getFallbackSong();
      }

      const newRefreshCount = forceNew ? refreshCount : 0;
      localStorage.setItem(STORAGE_KEY_SONG,    JSON.stringify(song));
      localStorage.setItem(STORAGE_KEY_DATE,    today);
      localStorage.setItem(STORAGE_KEY_REFRESH, String(newRefreshCount));
      currentSong = song;
      renderSong(song);
    }

    function handleRefresh() {
      if (refreshCount >= MAX_REFRESHES) return;
      refreshCount++;
      localStorage.setItem(STORAGE_KEY_REFRESH, String(refreshCount));
      loadOrFetchSong(true);
    }

    // ── Render ──
    function showLoading(show) {
      document.getElementById('loadingView').style.display = show ? 'flex' : 'none';
      document.getElementById('songCard').style.display    = show ? 'none' : 'flex';
    }

    function renderSong(song) {
      document.getElementById('songTitle').textContent  = song.title;
      document.getElementById('songArtist').textContent = song.artist;
      document.getElementById('songAlbum').textContent  = song.album || '';

      // Album art
      if (song.cover) {
        const img = document.getElementById('albumArt');
        img.src = song.cover;
        img.classList.remove('hidden');
        document.getElementById('artPlaceholder').classList.add('hidden');
        img.onload = () => img.classList.add('loaded');
        img.onerror = () => {
          img.classList.add('hidden');
          document.getElementById('artPlaceholder').classList.remove('hidden');
        };
      }

      // Spotify button
      if (song.spotifyUrl) {
        document.getElementById('spotifyBtn').classList.remove('hidden');
      }

      // Refresh button
      updateRefreshBtn();

      showLoading(false);
    }

    function updateRefreshBtn() {
      const btn  = document.getElementById('refreshBtn');
      const hint = document.getElementById('refreshHint');
      const left = MAX_REFRESHES - refreshCount;
      if (left <= 0) {
        btn.classList.add('disabled');
        hint.textContent = '';
      } else {
        btn.classList.remove('disabled');
        hint.textContent = `${left} left`;
      }
    }

    // ── Actions ──
    async function handleCopy() {
      if (!currentSong) return;
      const text = `🎵 ${currentSong.title} – ${currentSong.artist}`;
      const btn = document.getElementById('copyBtn');

      try {
        await navigator.clipboard.writeText(text);
      } catch {
        // fallback
        const el = document.createElement('textarea');
        el.value = text; document.body.appendChild(el);
        el.select(); document.execCommand('copy');
        document.body.removeChild(el);
      }

      btn.textContent = '✓  Copied!';
      btn.classList.add('success');
      setTimeout(() => {
        btn.textContent = 'Copy for Instagram Note';
        btn.classList.remove('success');
      }, 2000);
    }

    function handleSpotify() {
      if (currentSong?.spotifyUrl) window.open(currentSong.spotifyUrl, '_blank');
    }

    // ── Init ──
    document.getElementById('dateLabel').textContent = getTodayLabel();
    loadOrFetchSong();
  </script>
</body>
</html>
